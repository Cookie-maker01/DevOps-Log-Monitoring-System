name: Log Monitor CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Run script
        run: python main.py

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: log-report
          path: reports/